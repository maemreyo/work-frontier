name: CI

on:
  pull_request:
  push:
    branches: [main]

env:
  PYTHON_VERSION: "3.13.5"
  NODE_VERSION: "22.23.1"
  PNPM_VERSION: "10.20.0"
  COMPOSE_PROJECT_NAME: work-frontier-ci

jobs:
  preflight-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Run preflight validation
        run: node .omo/preflight/adr-006/validate.mjs
      - name: Run preflight behavioral tests
        run: node --test .omo/preflight/adr-006/validate.test.mjs

  contract-drift-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - name: Bootstrap Python dependencies
        run: uv sync --all-groups
      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile
      - name: Check contract drift
        run: uv run python scripts/generate_contracts.py --check
      - name: Check harness registry drift
        run: uv run python scripts/build_harness_registry.py --check
      - name: Check anatomy docs content drift
        run: |
          python3 scripts/check_anatomy_drift.py docs/anatomy --mode check

  verify:
    runs-on: ubuntu-latest
    needs: [preflight-gate, contract-drift-check]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - name: Bootstrap (first clean pass)
        run: make bootstrap
      - name: Static checks (first pass)
        run: make check-static
      - name: Unit tests (first pass)
        run: make test
      - name: Regeneration drift guard (clean-clone stability)
        run: |
          make generate-contracts
          make generate-harness-registry
          if ! git diff --quiet; then
            echo "::error::generated contracts/registry drift after regeneration"
            git diff --stat
            exit 1
          fi
          echo "regeneration is stable on a clean checkout"
      - name: Second clean pass (idempotency proof)
        run: |
          make bootstrap
          make check-static
          make test
          make generate-contracts
          make generate-harness-registry
          if ! git diff --quiet; then
            echo "::error::second clean pass produced drift — foundation is not idempotent"
            git diff --stat
            exit 1
          fi
          echo "second clean pass is byte-identical to first"
      - name: Install pinned gitleaks
        run: go install github.com/gitleaks/gitleaks/v8@v8.30.1
      - name: Infrastructure up + recertify + infrastructure down
        run: |
          set -euo pipefail
          trap 'make infra-down' EXIT
          make infra-up
          make recertify-foundation
      - name: Assert recertification subject SHA matches GITHUB_SHA
        run: |
          mapfile -t REPORTS < <(find ".omo/evidence/runs/${GITHUB_SHA:0:12}" -name foundation-recertification.json -type f)
          if [ "${#REPORTS[@]}" -ne 1 ]; then
            echo "::error::expected exactly one run-scoped recertification report, found ${#REPORTS[@]}"
            exit 1
          fi
          SUBJECT_SHA="$(python3 -c 'import json,sys; print(json.load(open(sys.argv[1]))["subject_sha"])' "${REPORTS[0]}")"
          if [ "$SUBJECT_SHA" != "$GITHUB_SHA" ]; then
            echo "::error::recertification subject_sha ${SUBJECT_SHA} does not match GITHUB_SHA ${GITHUB_SHA}"
            exit 1
          fi
          echo "recertification attests exact HEAD: ${SUBJECT_SHA}"
      - uses: gitleaks/gitleaks-action@v2
      - uses: anchore/sbom-action@v0
        with:
          path: .
          output-file: sbom.spdx.json
      - name: Upload evidence artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: omo-evidence
          path: .omo/evidence/**
          retention-days: 30
          if-no-files-found: warn
