name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  preflight-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Run preflight validation
        run: node .omo/preflight/adr-006/validate.mjs

  contract-drift-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.13"
      - uses: pnpm/action-setup@v4
        with:
          version: "10"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
      - name: Bootstrap Python dependencies
        run: uv sync --all-groups
      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile
      - name: Check contract drift
        run: uv run python scripts/generate_contracts.py --check

  verify:
    runs-on: ubuntu-latest
    needs: [preflight-gate, contract-drift-check]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.13"
      - uses: pnpm/action-setup@v4
        with:
          version: "10"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
      - run: make bootstrap
      - run: make check-architecture
      - run: uv run ruff check backend/src backend/tests scripts
      - run: uv run ruff format --check backend/src backend/tests scripts
      - run: uv run basedpyright
      - run: pnpm --dir frontend run check
      - run: make infra-up
      - run: make migration-smoke
      - run: make storage-smoke
      - run: make test
      - run: make infra-down
        if: always()
      - uses: gitleaks/gitleaks-action@v2
      - uses: anchore/sbom-action@v0
        with:
          path: .
          output-file: sbom.spdx.json
      - name: Upload evidence artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: omo-evidence
          path: .omo/evidence/**
          retention-days: 30
          if-no-files-found: warn
